<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ AntiScam Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0d10;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    nav {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { font-size: 1.2rem; font-weight: 700; }
    .nav-user { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; }
    .logout-btn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }
    .main { max-width: 900px; margin: 0 auto; padding: 32px 16px; }
    h2 { font-size: 1.5rem; margin-bottom: 24px; }
    .guilds { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .guild-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .guild-card:hover { border-color: #5865f2; background: rgba(88,101,242,0.1); }
    .guild-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .guild-icon-placeholder {
      width: 48px; height: 48px; border-radius: 50%;
      background: #5865f2;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.2rem;
    }
    .guild-info { flex: 1; min-width: 0; }
    .guild-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guild-status {
      font-size: 0.8rem;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }
    .status-in { background: rgba(87,242,135,0.2); color: #57f287; }
    .status-out { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .invite-btn {
      background: #5865f2;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .invite-btn:hover { background: #4752c4; }

    /* 設定面板 */
    #config-panel { display: none; }
    .back-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      padding: 0;
    }
    .back-btn:hover { color: #fff; }
    .config-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
    .config-title { font-size: 1.5rem; font-weight: 700; }
    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title { font-size: 1.1rem; font-weight: 600; }
    .toggle {
      width: 48px; height: 26px;
      background: rgba(255,255,255,0.2);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      flex-shrink: 0;
    }
    .toggle.on { background: #57f287; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(22px); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 1rem;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #5865f2;
    }
    .field select option { background: #1e1e26; }
    .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .save-btn {
      background: #5865f2;
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .save-btn:hover { background: #4752c4; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #57f287;
      color: #000;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .loading { text-align: center; padding: 60px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">🛡️ AntiScam Dashboard</div>
    <div class="nav-user">
      <img id="nav-avatar" class="avatar" src="" alt="" style="display:none">
      <span id="nav-username"></span>
      <button class="logout-btn" onclick="location.href='/api/logout'">登出</button>
    </div>
  </nav>

  <div class="main">
    <!-- 伺服器列表 -->
    <div id="guilds-panel">
      <h2>選擇要管理的伺服器</h2>
      <div id="guilds" class="guilds">
        <div class="loading">載入中...</div>
      </div>
    </div>

    <!-- 設定面板 -->
    <div id="config-panel">
      <button class="back-btn" onclick="showGuilds()">← 返回伺服器列表</button>
      <div class="config-header">
        <img id="config-guild-icon" style="width:48px;height:48px;border-radius:50%;display:none">
        <div id="config-guild-placeholder" class="guild-icon-placeholder" style="display:none"></div>
        <div class="config-title" id="config-guild-name"></div>
      </div>

      <!-- 全域開關 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">🛡️ 防詐群總開關</div>
          <button class="toggle" id="toggle-enabled" onclick="toggleField('enabled')"></button>
        </div>
      </div>

      <!-- Bot 偵測 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">🤖 外部應用程式洪水偵測</div>
          <button class="toggle" id="toggle-bot_flood_enabled" onclick="toggleField('bot_flood_enabled')"></button>
        </div>
        <div class="fields-row">
          <div class="field">
            <label>時間窗口（秒）</label>
            <input type="number" id="bot_flood_seconds" min="1" max="60">
          </div>
          <div class="field">
            <label>訊息數上限</label>
            <input type="number" id="bot_flood_threshold" min="2" max="100">
          </div>
        </div>
      </div>

      <!-- 刷頻禁言 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">🔇 刷頻自動禁言</div>
          <button class="toggle" id="toggle-spam_mute_enabled" onclick="toggleField('spam_mute_enabled')"></button>
        </div>
        <div class="fields-row">
          <div class="field">
            <label>時間窗口（秒）</label>
            <input type="number" id="spam_seconds" min="1" max="60">
          </div>
          <div class="field">
            <label>訊息數上限</label>
            <input type="number" id="spam_threshold" min="2" max="50">
          </div>
        </div>
        <div class="field">
          <label>禁言時間（分鐘）</label>
          <input type="number" id="mute_duration" min="1" max="10080">
        </div>
      </div>

      <!-- Webhook 偵測 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">🔗 Webhook 洪水偵測</div>
          <button class="toggle" id="toggle-webhook_flood_enabled" onclick="toggleField('webhook_flood_enabled')"></button>
        </div>
        <div class="fields-row">
          <div class="field">
            <label>時間窗口（秒）</label>
            <input type="number" id="webhook_flood_seconds" min="1" max="30">
          </div>
          <div class="field">
            <label>訊息數上限</label>
            <input type="number" id="webhook_flood_threshold" min="2" max="50">
          </div>
        </div>
      </div>

      <!-- Webhook @everyone 偵測 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">📢 Webhook @everyone 偵測</div>
          <button class="toggle" id="toggle-webhook_mention_enabled" onclick="toggleField('webhook_mention_enabled')"></button>
        </div>
        <div class="fields-row">
          <div class="field">
            <label>時間窗口（秒）</label>
            <input type="number" id="webhook_mention_seconds" min="1" max="60">
          </div>
          <div class="field">
            <label>訊息數上限</label>
            <input type="number" id="webhook_mention_threshold" min="1" max="20">
          </div>
        </div>
      </div>

      <!-- Bot @everyone 偵測 -->
      <div class="section">
        <div class="section-header">
          <div class="section-title">📢 外部應用程式 @everyone 偵測</div>
          <button class="toggle" id="toggle-bot_mention_enabled" onclick="toggleField('bot_mention_enabled')"></button>
        </div>
        <div class="fields-row">
          <div class="field">
            <label>時間窗口（秒）</label>
            <input type="number" id="bot_mention_seconds" min="1" max="60">
          </div>
          <div class="field">
            <label>訊息數上限</label>
            <input type="number" id="bot_mention_threshold" min="1" max="20">
          </div>
        </div>
      </div>

      <!-- 頻道設定 -->
      <div class="section">
        <div class="section-title" style="margin-bottom:20px">📋 頻道設定</div>
        <div class="field">
          <label>擁有者通知頻道（不設定則私訊擁有者）</label>
          <select id="owner_notify_channel">
            <option value="">❌ 未設定（私訊擁有者）</option>
          </select>
        </div>
        <div class="field">
          <label>違規處理訊息頻道</label>
          <select id="alert_channel">
            <option value="">❌ 未設定（發在事發頻道）</option>
          </select>
        </div>
        <div class="field">
          <label>違規訊息自動刪除（秒，0=不刪除）</label>
          <input type="number" id="alert_delete_after" min="0" max="600">
        </div>
      </div>

      <button class="save-btn" onclick="saveConfig()">💾 儲存設定</button>
    </div>
  </div>

  <div class="toast" id="toast">✅ 設定已儲存！</div>

  <script>
    let currentGuildId = null;
    let config = {};

    // 載入用戶資訊
    fetch('/api/me').then(r => r.json()).then(user => {
      if (user.error) return location.href = '/';
      document.getElementById('nav-username').textContent = user.username;
      if (user.avatar) {
        const img = document.getElementById('nav-avatar');
        img.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        img.style.display = 'block';
      }
    }).catch(() => location.href = '/');

    // 載入伺服器列表
    fetch('/api/guilds').then(r => r.json()).then(guilds => {
      const container = document.getElementById('guilds');
      container.innerHTML = '';
      guilds.forEach(guild => {
        const card = document.createElement('div');
        card.className = 'guild-card';

        let iconHtml = '';
        if (guild.icon) {
          iconHtml = `<img class="guild-icon" src="https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png" alt="">`;
        } else {
          iconHtml = `<div class="guild-icon-placeholder">${guild.name[0]}</div>`;
        }

        const statusClass = guild.botIn ? 'status-in' : 'status-out';
        const statusText = guild.botIn ? '✅ Bot 已在' : '➕ 尚未邀請';

        card.innerHTML = `
          ${iconHtml}
          <div class="guild-info">
            <div class="guild-name">${guild.name}</div>
            <span class="guild-status ${statusClass}">${statusText}</span>
          </div>
          ${guild.botIn
            ? `<button class="invite-btn" onclick="openConfig('${guild.id}', '${guild.name}', '${guild.icon || ''}'); event.stopPropagation()">⚙️ 設定</button>`
            : `<button class="invite-btn" onclick="inviteBot('${guild.id}'); event.stopPropagation()">邀請</button>`
          }
        `;

        if (guild.botIn) {
          card.onclick = () => openConfig(guild.id, guild.name, guild.icon || '');
        }
        container.appendChild(card);
      });
    });

    function inviteBot(guildId) {
      fetch(`/api/invite/${guildId}`).then(r => r.json()).then(data => {
        window.open(data.url, '_blank');
      });
    }

    async function openConfig(guildId, guildName, guildIcon) {
      currentGuildId = guildId;
      document.getElementById('guilds-panel').style.display = 'none';
      document.getElementById('config-panel').style.display = 'block';
      document.getElementById('config-guild-name').textContent = guildName;

      if (guildIcon) {
        const img = document.getElementById('config-guild-icon');
        img.src = `https://cdn.discordapp.com/icons/${guildId}/${guildIcon}.png`;
        img.style.display = 'block';
        document.getElementById('config-guild-placeholder').style.display = 'none';
      } else {
        const ph = document.getElementById('config-guild-placeholder');
        ph.textContent = guildName[0];
        ph.style.display = 'flex';
        document.getElementById('config-guild-icon').style.display = 'none';
      }

      // 載入設定
      const res = await fetch(`/api/guild/${guildId}/config`);
      config = await res.json();
      applyConfig(config);

      // 載入頻道
      const chRes = await fetch(`/api/guild/${guildId}/channels`);
      const channels = await chRes.json();
      populateChannels(channels, config);
    }

    function applyConfig(cfg) {
      const toggles = ['enabled', 'bot_flood_enabled', 'spam_mute_enabled',
        'webhook_flood_enabled', 'webhook_mention_enabled', 'bot_mention_enabled'];
      toggles.forEach(key => {
        const el = document.getElementById(`toggle-${key}`);
        if (el) el.classList.toggle('on', cfg[key]);
      });

      const inputs = ['bot_flood_seconds', 'bot_flood_threshold', 'spam_seconds',
        'spam_threshold', 'mute_duration', 'webhook_flood_seconds', 'webhook_flood_threshold',
        'webhook_mention_seconds', 'webhook_mention_threshold', 'bot_mention_seconds',
        'bot_mention_threshold', 'alert_delete_after'];
      inputs.forEach(key => {
        const el = document.getElementById(key);
        if (el) el.value = cfg[key] ?? '';
      });
    }

    function populateChannels(channels, cfg) {
      ['owner_notify_channel', 'alert_channel'].forEach(key => {
        const sel = document.getElementById(key);
        const current = cfg[key];
        sel.innerHTML = `<option value="">❌ 未設定</option>`;
        channels.forEach(ch => {
          const opt = document.createElement('option');
          opt.value = ch.id;
          opt.textContent = `#${ch.name}`;
          if (ch.id === String(current)) opt.selected = true;
          sel.appendChild(opt);
        });
      });
    }

    function toggleField(key) {
      config[key] = !config[key];
      const el = document.getElementById(`toggle-${key}`);
      if (el) el.classList.toggle('on', config[key]);
    }

    async function saveConfig() {
      const btn = document.querySelector('.save-btn');
      btn.disabled = true;
      btn.textContent = '儲存中...';

      const inputs = ['bot_flood_seconds', 'bot_flood_threshold', 'spam_seconds',
        'spam_threshold', 'mute_duration', 'webhook_flood_seconds', 'webhook_flood_threshold',
        'webhook_mention_seconds', 'webhook_mention_threshold', 'bot_mention_seconds',
        'bot_mention_threshold', 'alert_delete_after'];
      inputs.forEach(key => {
        const el = document.getElementById(key);
        if (el) config[key] = parseInt(el.value) || 0;
      });

      ['owner_notify_channel', 'alert_channel'].forEach(key => {
        const el = document.getElementById(key);
        if (el) config[key] = el.value || null;
      });

      await fetch(`/api/guild/${currentGuildId}/config`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(config)
      });

      btn.disabled = false;
      btn.textContent = '💾 儲存設定';
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    function showGuilds() {
      document.getElementById('guilds-panel').style.display = 'block';
      document.getElementById('config-panel').style.display = 'none';
    }
  </script>
</body>
</html>
