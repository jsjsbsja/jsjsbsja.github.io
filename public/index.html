<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ AntiScam Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0d10;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #5865f2, #eb459e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
      font-size: 1.1rem;
    }
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #5865f2;
      color: #fff;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .login-btn:hover {
      background: #4752c4;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88,101,242,0.4);
    }
    .login-btn svg {
      width: 24px;
      height: 24px;
    }
    .features {
      margin-top: 60px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      width: 180px;
    }
    .feature-icon { font-size: 32px; margin-bottom: 8px; }
    .feature-title { font-weight: 600; margin-bottom: 4px; }
    .feature-desc { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🛡️</div>
    <h1>AntiScam Dashboard</h1>
    <p>用 Discord 帳號登入，管理你的防詐群設定</p>
    <a href="/api/login" class="login-btn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      用 Discord 登入
    </a>
    <div class="features">
      <div class="feature">
        <div class="feature-icon">🤖</div>
        <div class="feature-title">Bot 偵測</div>
        <div class="feature-desc">外部應用程式刷頻防護</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔇</div>
        <div class="feature-title">刷頻禁言</div>
        <div class="feature-desc">自動禁言刷頻用戶</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔗</div>
        <div class="feature-title">Webhook 防護</div>
        <div class="feature-desc">自動刪除惡意 Webhook</div>
      </div>
    </div>
  </div>
</body>
</html>
